<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설가의 방 (The Writer's Room)</title>
    <style>
        /* 기본 스타일 및 서재 분위기 배경 */
        body {
            background-color: #1e1a17;
            color: #e6dfd3;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2rem;
            margin-top: 10px;
            margin-bottom: 15px;
            color: #d4af37; /* 금빛 타이틀 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 검색창 영역 */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .search-input {
            width: 100%;
            background: #2a221d;
            border: 1px solid #54453b;
            border-radius: 20px;
            padding: 10px 18px;
            color: #e6dfd3;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* 책장 레이아웃 (기본 PC는 다단 구성, 모바일에서 한 줄에 4개) */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 한 라인에 무조건 4개 */
            gap: 10px;
            max-width: 900px;
            width: 100%;
            padding: 15px 10px;
            border-bottom: 12px solid #3a2f28; /* 책장 선반 느낌 */
            box-shadow: 0 15px 15px rgba(0,0,0,0.5);
            background: rgba(40, 32, 26, 0.5);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* 책 링크 및 오브젝트 */
        .book-wrapper {
            position: relative;
            perspective: 800px;
            width: 100%;
        }

        .book-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* 모바일 4단 정렬을 위한 콤팩트한 북 스타일 */
        .book {
            border-left: 6px solid rgba(255, 255, 255, 0.15); /* 책등 효과 */
            box-shadow: 3px 3px 8px rgba(0,0,0,0.5), 
                        inset 1px 1px 0px rgba(255,255,255,0.15);
            border-radius: 2px 5px 5px 2px;
            height: 140px; /* 모바일 대응으로 높이 축소 */
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .book-wrapper:hover .book {
            transform: rotateY(-8deg) translateZ(5px);
            box-shadow: 8px 8px 15px rgba(0,0,0,0.6);
        }

        /* 책 표지 4가지 색상 랜덤 순환용 */
        .color-0 { background: linear-gradient(135deg, #4a1525 0%, #2c0b14 100%); } /* 레드 */
        .color-1 { background: linear-gradient(135deg, #1a2a3a 0%, #0d151d 100%); } /* 네이비 */
        .color-2 { background: linear-gradient(135deg, #1c352d 0%, #0e1b16 100%); } /* 그린 */
        .color-3 { background: linear-gradient(135deg, #543d2b 0%, #2e2116 100%); } /* 브라운 */

        .book-title {
            font-size: 0.75rem; /* 모바일 가독성을 위해 크기 조절 */
            font-weight: bold;
            line-height: 1.3;
            color: #f4ebd9;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* 세 줄 제한 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .book-subtitle {
            font-size: 0.6rem;
            color: #c2b59b;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 두 줄 제한 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-meta {
            font-size: 0.55rem;
            color: #a89f91;
            text-align: right;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 4px;
            white-space: nowrap;
        }

        /* 책 수정용 관리 버튼 */
        .btn-edit {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8; /* 모바일 조작 편의성을 위해 기본 노출 상승 */
            z-index: 10;
        }

        /* [+] 추가 버튼 디자인 */
        .add-card {
            border: 2px dashed #54453b;
            border-radius: 5px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            color: #8c7b6e;
            box-sizing: border-box;
        }

        .add-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: #d4af37;
            color: #d4af37;
        }

        .add-icon {
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .add-text {
            font-size: 0.7rem;
        }

        /* 입력 팝업(모달) 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: #2a221d;
            border: 1px solid #4d3e35;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .modal-title {
            font-size: 1.15rem;
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #4d3e35;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #a89f91;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            background: #1e1a17;
            border: 1px solid #4d3e35;
            color: #e6dfd3;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary { background: #d4af37; color: #1e1a17; }
        .btn-primary:hover { background: #ecd06c; }
        .btn-secondary { background: #4d3e35; color: #e6dfd3; }
        .btn-secondary:hover { background: #5d4d42; }
        .btn-danger { background: #8a2424; color: #fff; }
        .btn-danger:hover { background: #b03535; }

        /* 로딩 스피너 */
        .loading {
            grid-column: span 4;
            text-align: center;
            font-size: 0.9rem;
            color: #d4af37;
            padding: 30px 0;
        }

        /* 데스크톱 크기 보정 (데스크톱에서도 레이아웃이 일그러지지 않도록 조절) */
        @media (min-width: 600px) {
            .book {
                height: 180px;
                padding: 15px 10px;
            }
            .book-title {
                font-size: 0.95rem;
            }
            .book-subtitle {
                font-size: 0.75rem;
            }
            .book-meta {
                font-size: 0.65rem;
            }
            .add-card {
                height: 180px;
            }
            .add-icon {
                font-size: 2.5rem;
            }
            .add-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <h1>소설가의 방</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="소설 제목 또는 부제 검색..." oninput="filterBooks()">
    </div>

    <div class="bookshelf" id="bookshelf">
        <div class="loading">서재에서 책을 꺼내오는 중입니다...</div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">새 책 등록하기</h3>
            <input type="hidden" id="editRowIndex" value="">
            
            <div class="form-group">
                <label for="bookTitle">소설 제목</label>
                <input type="text" id="bookTitle" placeholder="제목을 입력하세요" required>
            </div>
            
            <div class="form-group">
                <label for="bookSubtitle">부제</label>
                <input type="text" id="bookSubtitle" placeholder="소제목이나 부제를 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="bookUrl">구글독스 URL</label>
                <input type="url" id="bookUrl" placeholder="https://docs.google.com/..." required>
            </div>

            <div class="modal-actions">
                <div>
                    <button class="btn btn-danger" id="btnDelete" onclick="deleteBook()" style="display: none;">삭제</button>
                </div>
                <div>
                    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                    <button class="btn btn-primary" id="btnSave" onclick="saveBook()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 구글 앱스 스크립트 배포 후 얻은 웹 앱 URL을 여기에 붙여넣어 주세요!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwc0guFpQ6vaMtbcyw9SAVmOXGj6QpFW7uXrb4xtdLPVJTX_Pfk4iomMdsGYLAt7C3qDg/exec"; 

        let novels = []; // 시트에서 가져온 전체 책 데이터 저장용
        const bookshelf = document.getElementById('bookshelf');
        const modal = document.getElementById('modal');

        // 앱스 스크립트 API를 활용한 데이터 호출 (GET)
        async function fetchNovels() {
            try {
                bookshelf.innerHTML = '<div class="loading">서재에서 책을 꺼내오는 중입니다...</div>';
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('네트워크 응답 오류');
                novels = await response.json();
                renderBooks(novels);
            } catch (error) {
                console.error("데이터 가져오기 실패:", error);
                bookshelf.innerHTML = '<div class="loading" style="color:#b03535;">책을 불러오지 못했습니다.<br>API 주소 확인이 필요합니다.</div>';
            }
        }

        // 화면 갱신 함수 (필터된 배열을 매개변수로 받음)
        function renderBooks(dataList) {
            bookshelf.innerHTML = '';

            // 1. 책 리스트 그리기
            dataList.forEach((novel) => {
                // 디자인 무작위 순환용 인덱스는 API 행번호 기준으로 자연스럽게 설정
                const colorIndex = (novel.rowIndex || 0) % 4;
                const colorClass = `color-${colorIndex}`;

                const wrapper = document.createElement('div');
                wrapper.className = 'book-wrapper';
                
                wrapper.innerHTML = `
                    <a href="${novel.url}" target="_blank" class="book-link">
                        <div class="book ${colorClass}">
                            <div>
                                <div class="book-title">${novel.title}</div>
                                <div class="book-subtitle">${novel.subtitle || ''}</div>
                            </div>
                            <div class="book-meta">${novel.updatedAt ? novel.updatedAt.substring(0, 10) : ''}</div>
                        </div>
                    </a>
                    <button class="btn-edit" onclick="openEditModal(${novel.rowIndex})" title="수정">✏️</button>
                `;
                bookshelf.appendChild(wrapper);
            });

            // 2. 맨 끝에 [+] 카드 그리기
            const addCard = document.createElement('div');
            addCard.className = 'add-card';
            addCard.onclick = () => openAddModal();
            addCard.innerHTML = `
                <span class="add-icon">+</span>
                <span class="add-text">새 책 쓰기</span>
            `;
            bookshelf.appendChild(addCard);
        }

        // 실시간 검색 기능 (소설 제목 및 부제 검색 매칭)
        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderBooks(novels);
                return;
            }
            const filtered = novels.filter(n => 
                (n.title && n.title.toLowerCase().includes(query)) || 
                (n.subtitle && n.subtitle.toLowerCase().includes(query))
            );
            renderBooks(filtered);
        }

        // 모달 열기 (등록 모드)
        function openAddModal() {
            document.getElementById('modalTitle').innerText = '새 책 등록하기';
            document.getElementById('editRowIndex').value = '';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookSubtitle').value = '';
            document.getElementById('bookUrl').value = '';
            document.getElementById('btnDelete').style.display = 'none';
            modal.style.display = 'flex';
        }

        // 모달 열기 (수정 모드 - 시트의 행 번호(rowIndex) 기준)
        function openEditModal(rowIndex) {
            event.stopPropagation(); // 책 링크 타기 방지
            event.preventDefault();

            const novel = novels.find(n => n.rowIndex === rowIndex);
            if (!novel) return;

            document.getElementById('modalTitle').innerText = '소설 정보 수정';
            document.getElementById('editRowIndex').value = rowIndex;
            document.getElementById('bookTitle').value = novel.title;
            document.getElementById('bookSubtitle').value = novel.subtitle || '';
            document.getElementById('bookUrl').value = novel.url;
            document.getElementById('btnDelete').style.display = 'inline-block';
            modal.style.display = 'flex';
        }

        // 모달 닫기
        function closeModal() {
            modal.style.display = 'none';
        }

        // API 연동 저장 처리 (등록 및 수정 공용 POST 통신)
        async function saveBook() {
            const rowIndex = document.getElementById('editRowIndex').value;
            const title = document.getElementById('bookTitle').value.trim();
            const subtitle = document.getElementById('bookSubtitle').value.trim();
            const url = document.getElementById('bookUrl').value.trim();

            if (!title || !url) {
                alert('제목과 구글독스 URL은 필수 입력 항목입니다.');
                return;
            }

            // 오늘 날짜 자동 포맷팅 (YYYY-MM-DD)
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedDate = `${yyyy}-${mm}-${dd}`;

            const btnSave = document.getElementById('btnSave');
            btnSave.innerText = "저장 중...";
            btnSave.disabled = true;

            const payload = {
                title,
                subtitle,
                url,
                updatedAt: formattedDate
            };

            if (rowIndex === '') {
                // 신규 생성
                payload.action = "create";
            } else {
                // 기존 수정
                payload.action = "update";
                payload.rowIndex = rowIndex;
            }

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const resData = await response.json();
                if (resData.result === 'success') {
                    alert('저장되었습니다.');
                    closeModal();
                    fetchNovels(); // 저장 성공 시 리스트 동기화 호출
                } else {
                    alert('저장에 실패했습니다: ' + resData.message);
                }
            } catch (error) {
                console.error("저장 통신 에러:", error);
                alert('구글 시트 연동 중 에러가 발생했습니다.');
            } finally {
                btnSave.innerText = "저장";
                btnSave.disabled = false;
            }
        }

        // API 연동 삭제 처리
        async function deleteBook() {
            const rowIndex = document.getElementById('editRowIndex').value;
            if (rowIndex !== '' && confirm('이 책을 삭제하시겠습니까?')) {
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "delete",
                            rowIndex: rowIndex
                        })
                    });
                    const resData = await response.json();
                    if (resData.result === 'success') {
                        alert('삭제되었습니다.');
                        closeModal();
                        fetchNovels();
                    } else {
                        alert('삭제 실패: ' + resData.message);
                    }
                } catch (error) {
                    console.error("삭제 에러:", error);
                    alert('통신 오류가 발생했습니다.');
                }
            }
        }

        // 외부 영역 클릭 시 모달 닫기
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // 앱 구동 시 실시간 데이터 취소 호출
        fetchNovels();
    </script>
</body>
</html>

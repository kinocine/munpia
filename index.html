<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설가의 방 (The Writer's Room)</title>
    
    <!-- 📌 PC 탭 & 모바일 홈 화면 아이콘을 동시 해결하는 딱 두 줄 설정 -->
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgvQX2i_Mvoy-GMc0P09YSaLzeCwOvmCcgOFjAADQmEOtFxtK7FM63RPo0_PMGNuxDKSfijZmJrLPDaVfHtuxinPD4XYuhXmXCij0FRR_gpsMlWZ1eyZZL0t2CKH3cUCgkXCEg_P4oYMfcTERkHob0DSIYg2PrdtMA8GAweiRQ1EAsvkq6RKjSLNdQra7I2/s320/20260721_145044.png">
    <link rel="apple-touch-icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgvQX2i_Mvoy-GMc0P09YSaLzeCwOvmCcgOFjAADQmEOtFxtK7FM63RPo0_PMGNuxDKSfijZmJrLPDaVfHtuxinPD4XYuhXmXCij0FRR_gpsMlWZ1eyZZL0t2CKH3cUCgkXCEg_P4oYMfcTERkHob0DSIYg2PrdtMA8GAweiRQ1EAsvkq6RKjSLNdQra7I2/s320/20260721_145044.png">

    <style>
        /* 밝고 화사한 내추럴 우드 도서실 스타일 배경 */
        body {
            background-color: #f7f5f0;
            color: #4a3e3d;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 📌 제목 영역 레이아웃 수정 (아이콘과 텍스트 정렬) */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .title-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2rem;
            margin: 0;
            color: #8c6239; /* 포근한 나무색 타이틀 */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 검색창 영역 */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .search-input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #d1c7bd;
            border-radius: 20px;
            padding: 10px 18px;
            color: #4a3e3d;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .search-input:focus {
            border-color: #b8936e;
            box-shadow: 0 0 8px rgba(184, 147, 110, 0.3);
        }

        /* 밝은 원목 책장 레이아웃 */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 한 라인에 무조건 3개 배치 */
            gap: 16px; /* 3개 배치에 맞춰 간격 소폭 조정 */
            max-width: 900px;
            width: 100%;
            padding: 20px 12px;
            border-bottom: 14px solid #c2a689; /* 내추럴 원목 선반 느낌 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            background: #fdfbf7;
            border-radius: 8px;
            border: 1px solid #eadecc;
            box-sizing: border-box;
        }

        /* 책 링크 및 오브젝트 */
        .book-wrapper {
            position: relative;
            perspective: 800px;
            width: 100%;
        }

        .book-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* 책 스타일 양식 수정 */
        .book {
            border-left: 6px solid rgba(255, 255, 255, 0.25); /* 책등 입체 효과 */
            box-shadow: 2px 4px 8px rgba(0,0,0,0.12), 
                        inset 1px 1px 0px rgba(255,255,255,0.2);
            border-radius: 2px 5px 5px 2px;
            height: 140px; 
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .book-wrapper:hover .book {
            transform: rotateY(-8deg) translateZ(5px);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.18);
        }

        /* 감성적이고 화사한 파스텔 북 표지 색상 */
        .color-0 { background: linear-gradient(135deg, #7b9acc 0%, #5e7fa8 100%); } /* 세레니티 블루 */
        .color-1 { background: linear-gradient(135deg, #a7c796 0%, #85a673 100%); } /* 세이지 그린 */
        .color-2 { background: linear-gradient(135deg, #df9898 0%, #bd7373 100%); } /* 인디핑크 */
        .color-3 { background: linear-gradient(135deg, #d9b48f 0%, #b8936e 100%); } /* 카멜 베이지 */

        .book-title {
            font-size: 0.75rem;
            font-weight: bold;
            line-height: 1.3;
            color: #ffffff;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        .book-subtitle {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* 하단 메인 레이아웃 (날짜 + 수정버튼 배치용 flex박스) */
        .book-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px dashed rgba(255, 255, 255, 0.25);
            padding-top: 5px;
            margin-top: 4px;
        }

        .book-meta {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        /* 하단 날짜 옆으로 이동 및 간결한 아이콘형 버튼 디자인 변경 */
        .btn-edit {
            background: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            box-sizing: border-box;
            padding: 0;
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.45);
        }

        /* [+] 추가 버튼 디자인 디자인 톤 조정 */
        .add-card {
            border: 2px dashed #c2a689;
            border-radius: 5px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            color: #a88d74;
            box-sizing: border-box;
            background: #ffffff;
        }

        .add-card:hover {
            background: #fdfaf5;
            border-color: #b8936e;
            color: #b8936e;
        }

        .add-icon {
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .add-text {
            font-size: 0.7rem;
        }

        /* 입력 팝업(모달) 스타일 모던 라이트 톤 변경 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(40, 35, 30, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: #ffffff;
            border: 1px solid #e5dec9;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .modal-title {
            font-size: 1.15rem;
            color: #8c6239;
            margin-top: 0;
            margin-bottom: 18px;
            border-bottom: 1px solid #eeeada;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #706259;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            background: #faf9f5;
            border: 1px solid #dcd5c9;
            color: #4a3e3d;
            padding: 9px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #b8936e;
            background: #ffffff;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 22px;
        }

        .btn {
            padding: 9px 18px;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary { background: #b8936e; color: #fff; }
        .btn-primary:hover { background: #a37f59; }
        .btn-secondary { background: #eadecc; color: #5c4f46; }
        .btn-secondary:hover { background: #dccbb5; }
        .btn-danger { background: #c94c4c; color: #fff; }
        .btn-danger:hover { background: #b33b3b; }

        .loading {
            grid-column: span 3; /* 3열 배치에 맞춰 span 크기 변경 */
            text-align: center;
            font-size: 0.9rem;
            color: #a37f59;
            padding: 30px 0;
        }

        /* 데스크톱 크기 보정 */
        @media (min-width: 600px) {
            .title-container {
                gap: 16px;
            }
            .title-logo {
                width: 48px;
                height: 48px;
            }
            .book {
                height: 180px;
                padding: 15px 12px;
            }
            .book-title {
                font-size: 0.95rem;
            }
            .book-subtitle {
                font-size: 0.75rem;
            }
            .book-meta {
                font-size: 0.65rem;
            }
            .btn-edit {
                width: 20px;
                height: 20px;
                font-size: 0.65rem;
            }
            .add-card {
                height: 180px;
            }
            .add-icon {
                font-size: 2.5rem;
            }
            .add-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- 📌 상단 타이틀 영역 구조 수정: 이미지와 제목 결합 -->
    <div class="title-container">
        <img class="title-logo" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgvQX2i_Mvoy-GMc0P09YSaLzeCwOvmCcgOFjAADQmEOtFxtK7FM63RPo0_PMGNuxDKSfijZmJrLPDaVfHtuxinPD4XYuhXmXCij0FRR_gpsMlWZ1eyZZL0t2CKH3cUCgkXCEg_P4oYMfcTERkHob0DSIYg2PrdtMA8GAweiRQ1EAsvkq6RKjSLNdQra7I2/s320/20260721_145044.png" alt="소설가의 방 아이콘">
        <h1>소설가의 방</h1>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="소설 제목 또는 부제 검색..." oninput="filterBooks()">
    </div>

    <div class="bookshelf" id="bookshelf">
        <div class="loading">서재에서 책을 꺼내오는 중입니다...</div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">새 책 등록하기</h3>
            <input type="hidden" id="editRowIndex" value="">
            
            <div class="form-group">
                <label for="bookTitle">소설 제목</label>
                <input type="text" id="bookTitle" placeholder="제목을 입력하세요" required>
            </div>
            
            <div class="form-group">
                <label for="bookSubtitle">부제</label>
                <input type="text" id="bookSubtitle" placeholder="소제목이나 부제를 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="bookUrl">구글독스 URL</label>
                <input type="url" id="bookUrl" placeholder="https://docs.google.com/..." required>
            </div>

            <div class="modal-actions">
                <div>
                    <button class="btn btn-danger" id="btnDelete" onclick="deleteBook()" style="display: none;">삭제</button>
                </div>
                <div>
                    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                    <button class="btn btn-primary" id="btnSave" onclick="saveBook()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwc0guFpQ6vaMtbcyw9SAVmOXGj6QpFW7uXrb4xtdLPVJTX_Pfk4iomMdsGYLAt7C3qDg/exec"; 

        let novels = []; 
        const bookshelf = document.getElementById('bookshelf');
        const modal = document.getElementById('modal');

        async function fetchNovels() {
            try {
                bookshelf.innerHTML = '<div class="loading">서재에서 책을 꺼내오는 중입니다...</div>';
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('네트워크 응답 오류');
                novels = await response.json();
                renderBooks(novels);
            } catch (error) {
                console.error("데이터 가져오기 실패:", error);
                bookshelf.innerHTML = '<div class="loading" style="color:#b33b3b;">책을 불러오지 못했습니다.<br>API 주소 확인이 필요합니다.</div>';
            }
        }

        function renderBooks(dataList) {
            bookshelf.innerHTML = '';

            dataList.forEach((novel) => {
                const colorIndex = (novel.rowIndex || 0) % 4;
                const colorClass = `color-${colorIndex}`;

                const wrapper = document.createElement('div');
                wrapper.className = 'book-wrapper';
                
                wrapper.innerHTML = `
                    <a href="${novel.url}" target="_blank" class="book-link">
                        <div class="book ${colorClass}">
                            <div>
                                <div class="book-title">${novel.title}</div>
                                <div class="book-subtitle">${novel.subtitle || ''}</div>
                            </div>
                            <div class="book-footer">
                                <div class="book-meta">${novel.updatedAt ? novel.updatedAt.substring(0, 10) : ''}</div>
                                <button class="btn-edit" onclick="openEditModal(event, ${novel.rowIndex})" title="수정">✏️</button>
                            </div>
                        </div>
                    </a>
                `;
                bookshelf.appendChild(wrapper);
            });

            const addCard = document.createElement('div');
            addCard.className = 'add-card';
            addCard.onclick = () => openAddModal();
            addCard.innerHTML = `
                <span class="add-icon">+</span>
                <span class="add-text">새 책 쓰기</span>
            `;
            bookshelf.appendChild(addCard);
        }

        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderBooks(novels);
                return;
            }
            const filtered = novels.filter(n => 
                (n.title && n.title.toLowerCase().includes(query)) || 
                (n.subtitle && n.subtitle.toLowerCase().includes(query))
            );
            renderBooks(filtered);
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = '새 책 등록하기';
            document.getElementById('editRowIndex').value = '';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookSubtitle').value = '';
            document.getElementById('bookUrl').value = '';
            document.getElementById('btnDelete').style.display = 'none';
            modal.style.display = 'flex';
        }

        function openEditModal(event, rowIndex) {
            event.stopPropagation(); 
            event.preventDefault();

            const novel = novels.find(n => n.rowIndex === rowIndex);
            if (!novel) return;

            document.getElementById('modalTitle').innerText = '소설 정보 수정';
            document.getElementById('editRowIndex').value = rowIndex;
            document.getElementById('bookTitle').value = novel.title;
            document.getElementById('bookSubtitle').value = novel.subtitle || '';
            document.getElementById('bookUrl').value = novel.url;
            document.getElementById('btnDelete').style.display = 'inline-block';
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        async function saveBook() {
            const rowIndex = document.getElementById('editRowIndex').value;
            const title = document.getElementById('bookTitle').value.trim();
            const subtitle = document.getElementById('bookSubtitle').value.trim();
            const url = document.getElementById('bookUrl').value.trim();

            if (!title || !url) {
                alert('제목과 구글독스 URL은 필수 입력 항목입니다.');
                return;
            }

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedDate = `${yyyy}-${mm}-${dd}`;

            const btnSave = document.getElementById('btnSave');
            btnSave.innerText = "저장 중...";
            btnSave.disabled = true;

            const payload = {
                title,
                subtitle,
                url,
                updatedAt: formattedDate
            };

            if (rowIndex === '') {
                payload.action = "create";
            } else {
                payload.action = "update";
                payload.rowIndex = rowIndex;
            }

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const resData = await response.json();
                if (resData.result === 'success') {
                    alert('저장되었습니다.');
                    closeModal();
                    fetchNovels(); 
                } else {
                    alert('저장에 실패했습니다: ' + resData.message);
                }
            } catch (error) {
                console.error("저장 통신 에러:", error);
                alert('구글 시트 연동 중 에러가 발생했습니다.');
            } finally {
                btnSave.innerText = "저장";
                btnSave.disabled = false;
            }
        }

        async function deleteBook() {
            const rowIndex = document.getElementById('editRowIndex').value;
            if (rowIndex !== '' && confirm('이 책을 삭제하시겠습니까?')) {
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "delete",
                            rowIndex: rowIndex
                        })
                    });
                    const resData = await response.json();
                    if (resData.result === 'success') {
                        alert('삭제되었습니다.');
                        closeModal();
                        fetchNovels();
                    } else {
                        alert('삭제 실패: ' + resData.message);
                    }
                } catch (error) {
                    console.error("삭제 에러:", error);
                    alert('통신 오류가 발생했습니다.');
                }
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        fetchNovels();
    </script>
</body>
</html>
